{% extends 'base.html' %}

{% block content %}

<h2>Supplier List</h2>

<a href="/add-supplier/" class="btn btn-primary">
Add Supplier
</a>

<br><br>

<table class ="table table-striped table-hover shadow">

<tr>
<th>ID</th>
<th>Name</th>
<th>Contact</th>
<th>Email</th>
<th>Action</th>
</tr>

{% for s in suppliers %}

<tr>

<td>{{ s.id }}</td>
<td>{{ s.supplier_name }}</td>
<td>{{ s.contact }}</td>
<td>{{ s.email }}</td>

<td>

<a href="/update-supplier/{{s.id}}/">
Edit
</a>

|

<a href="/delete-supplier/{{s.id}}/">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
