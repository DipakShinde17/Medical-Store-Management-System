
<!DOCTYPE html>
<html>
<head>

<title>Medical Store Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(
    rgba(0,0,0,.4),
    rgba(0,0,0,.4)
    ),

    url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d');

    background-size:cover;
    background-position:center;

    font-family:'Segoe UI',sans-serif;
}

.login-card{

    width:450px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    overflow:hidden;

    box-shadow:
    0 20px 50px rgba(0,0,0,.4);

    animation:fadeIn 1s;
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.header{

    text-align:center;

    padding:30px;

    color:white;
}

.header h2{

    font-weight:bold;
}

.header p{

    color:#ddd;
}

.card-body{

    padding:35px;
}

.form-control{

    height:50px;

    border-radius:12px;

    border:none;
}

.btn-login{

    height:50px;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-weight:bold;

    border:none;

    transition:.3s;
}

.btn-login:hover{

    transform:scale(1.03);

    background:#1d4ed8;
}

.footer-text{

    text-align:center;

    color:white;

    margin-top:15px;

    font-size:14px;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="header">

        <h2>
            <i class="fa-solid fa-capsules"></i>
            SHINDE MEDICAL STORE
        </h2>

        <p>
            Inventory & Billing Management System
        </p>

    </div>

    <div class="card-body">

        <div class="text-center mb-4">

            <h4 class="text-white">
                Welcome Back 👋
            </h4>

        </div>

        {% if messages %}

            {% for message in messages %}

            <div class="alert alert-success">

                {{ message }}

            </div>

            {% endfor %}

        {% endif %}

        <form method="POST" autocomplete="off">

            {% csrf_token %}

            <div class="mb-3">

                <label class="text-white">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    autocomplete="new-password">

            </div>

            <div class="mb-3">

                <label class="text-white">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    autocomplete="new-password">

            </div>

            <button
            type="submit"
            class="btn btn-login w-100">

                🔐 Login

            </button>




        <div class="alert alert-info shadow-sm mt-3">

    <h5>
        🔑 Demo Login Credentials
    </h5>

    <hr>

    <p class="mb-2">
        <strong>Username :</strong> Dipak
    </p>

    <p class="mb-0">
        <strong>Password :</strong> 12345
    </p>

</div>
        </form>

        <div class="footer-text">

            © 2026 Shinde Medical Store

        </div>

    </div>

</div>

</body>
</html>
