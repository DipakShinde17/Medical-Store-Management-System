{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg border-0 mt-4">

                <div class="card-header bg-primary text-white">

                    <h3 class="mb-0">
                        💊 Add Medicine
                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Medicine Name
                            </label>

                            {{ form.medicine_name }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            {{ form.category }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Quantity
                            </label>

                            {{ form.quantity }}

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            {{ form.price }}

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success">

                            💾 Save Medicine

                        </button>

                        <a href="/medicines/"
                           class="btn btn-secondary">

                           Back

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
