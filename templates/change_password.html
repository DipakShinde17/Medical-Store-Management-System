{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card shadow border-0">

<div class="card-header bg-warning">

<h3>
🔐 Change Password
</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>
Current Password
</label>

{{ form.old_password }}

</div>

<div class="mb-3">

<label>
New Password
</label>

{{ form.new_password1 }}

</div>

<div class="mb-3">

<label>
Confirm Password
</label>

{{ form.new_password2 }}

</div>

<button
class="btn btn-success">

💾 Update Password

</button>

<a href="{% url 'settings' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
