{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow-lg p-4">

        <h2 class="mb-4">
            Billing System
        </h2>
        {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

{% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Customer Name
                </label>

                <input
                type="text"
                name="customer_name"
                class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Medicine
                </label>

                <select
                name="medicine"
                id="medicine"
                class="form-select">

                {% for medicine in medicines %}

                <option
                value="{{ medicine.id }}"
                data-price="{{ medicine.price }}">

                {{ medicine.medicine_name }}
                - ₹{{ medicine.price }}

                </option>

                {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Quantity
                </label>

                <input
                type="number"
                id="qty"
                name="quantity"
                class="form-control"
                value="1">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Total Amount
                </label>

                <input
                type="text"
                id="total"
                class="form-control"
                readonly>

            </div>

            <button
            type="submit"
            class="btn btn-success">

            Save Bill

            </button>

        </form>

    </div>

</div>

<script>

function calculateTotal(){

let medicine =
document.getElementById("medicine");

let price =
medicine.options[
medicine.selectedIndex
].getAttribute(
"data-price"
);

let qty =
document.getElementById("qty").value;

let total =
price * qty;

document.getElementById(
"total"
).value =
total.toFixed(2);

}

document.getElementById(
"medicine"
).addEventListener(
"change",
calculateTotal
);

document.getElementById(
"qty"
).addEventListener(
"input",
calculateTotal
);

calculateTotal();

</script>

{% endblock %}
